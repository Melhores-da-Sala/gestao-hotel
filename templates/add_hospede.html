<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/static/css/style.css">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <title>Novo Hóspede | Grand Solaris</title>
</head>

<body>

    <aside class="sidebar">

        <div class="logo-area">

            <img src="/static/assets/logo_hotel.png" alt="Logo Hotel">

            <h2>Grand Solaris</h2>

        </div>

        <nav>

            <a href="/hospedes">

                <i class="bi bi-arrow-left"></i>

                Voltar

            </a>

        </nav>

    </aside>

    <main>

        <header class="topbar">

            <div>

                <h1>Novo Hóspede</h1>

                <p>
                    Cadastro de hóspedes no sistema hoteleiro
                </p>

            </div>

        </header>

        <section class="banner">

            <h1 class="titulo">
                Cadastro de Hóspede
            </h1>

            <p>
                Preencha os dados abaixo para adicionar
                um novo hóspede ao sistema.
            </p>

        </section>

        <section class="formulario_container">

            <form action="/add_hospede" method="post">

                <div class="grupo_input">

                    <label>Nome</label>

                    <input
                        type="text"
                        name="nome"
                        placeholder="Digite o nome do hóspede"
                        required>

                </div>

                <div class="grupo_input">

                    <label>Email</label>

                    <input
                        type="email"
                        name="email"
                        placeholder="Digite o email">

                </div>

                <div class="grupo_input">

                    <label>Telefone</label>

                    <input
                        type="text"
                        name="telefone"
                        placeholder="Digite o telefone">

                </div>

                <div class="grupo_input">

                    <label>CPF</label>

                    <input
                        type="text"
                        name="cpf"
                        placeholder="Digite o CPF">

                </div>

                <button type="submit" class="botao_salvar">

                    <i class="bi bi-check-lg"></i>

                    Salvar Hóspede

                </button>

            </form>

        </section>

    </main>

</body>

</html>
