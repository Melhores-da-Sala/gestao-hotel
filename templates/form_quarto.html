<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/style.css">
    <title>
        {% if quarto %}Editar Quarto{% else %}Novo Quarto{% endif %} | Hotel Grand Solaris
    </title>
</head>
<body>
    <aside class="sidebar">
        <div class="logo-area">
            <img src="/static/assets/logo_hotel.png" alt="Logo Hotel">
        </div>
        <nav>
            <a href="/">Dashboard</a>
            <a href="/hospedes">Hóspedes</a>
            <a href="/quartos" class="active">Quartos</a>
            <a href="/reservas">Reservas</a>
        </nav>
    </aside>
    <main>
        <div class="form-container">
            <div class="form-header">
                <h2>{% if quarto %}Editar Quarto{% else %}Novo Quarto{% endif %}</h2>
                <a href="/quartos" class="btn-voltar">← Voltar</a>
            </div>

            <form method="POST" action="{% if quarto %}/edit_quarto/{{ quarto.id }}{% else %}/add_quarto{% endif %}">

                <div class="form-group">
                    <label for="numero">Número do Quarto</label>
                    <input type="text" id="numero" name="numero" placeholder="Ex: 101"
                        value="{{ quarto.numero if quarto else '' }}" required>
                </div>

                <div class="form-group">
                    <label for="tipo">Tipo</label>
                    <input type="text" id="tipo" name="tipo" placeholder="Ex: Simples, Duplo, Suíte"
                        value="{{ quarto.tipo if quarto else '' }}" required>
                </div>

                <div class="form-group">
                    <label for="valor_diaria">Valor da Diária (R$)</label>
                    <input type="number" id="valor_diaria" name="valor_diaria" placeholder="Ex: 150.00" step="0.01"
                        min="0" value="{{ quarto.valor_diaria if quarto else '' }}" required>
                </div>

                <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status" name="status" required>
                        <option value="" disabled {% if not quarto %}selected{% endif %}>Selecione...</option>
                        <option value="Disponível" {% if quarto and quarto.status=='Disponível' %}selected{% endif %}>
                            Disponível</option>
                        <option value="Ocupado" {% if quarto and quarto.status=='Ocupado' %}selected{% endif %}>Ocupado
                        </option>
                        <option value="Manutenção" {% if quarto and quarto.status=='Manutenção' %}selected{% endif %}>
                            Manutenção</option>
                    </select>
                </div>
                <button type="submit" class="btn-salvar">
                    Salvar Alterações
                </button>
            </form>
        </div>
    </main>
</body>
</html>
